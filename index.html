<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 50%, #b71c1c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #d32f2f;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #ffc107;
        }

        .count-section {
            margin-bottom: 20px;
        }

        .count-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .count-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .count-btn.active {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            border-color: #ff9800;
            color: white;
        }

        .lottery-section {
            background: linear-gradient(135deg, #fff8e1 0%, #fff3e0 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 抽奖字体调小 */
        .lottery-display {
            min-height: 60px;
            font-size: 24px;
            font-weight: bold;
            color: #d32f2f;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .lottery-display.running {
            color: #ff9800;
        }

        .lottery-display.winner {
            color: #d32f2f;
            animation: winnerPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes winnerPulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .winner-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .control-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-btn {
            flex: 1;
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .start-btn {
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
            color: white;
        }

        .reset-btn {
            background: linear-gradient(135deg, #607d8b 0%, #546e7a 100%);
            color: white;
        }

        .history-section {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ffc107;
            display: flex;
            align-items: center;
        }

        .history-number {
            width: 28px;
            height: 28px;
            background: #ffc107;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .empty-history {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 480px) {
            .control-section {
                flex-direction: column;
            }
            .lottery-display {
                font-size: 20px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 幸运大抽奖 🎉</h1>

        <div class="input-section">
            <label>输入名单（一行一个名字，仅纯人名，禁止空格/标点/符号/数字）</label>
            <textarea id="nameList" placeholder="请输入名单，每行一个纯人名"></textarea>
        </div>

        <div class="count-section">
            <label>选择中奖人数</label>
            <div class="count-buttons">
                <button class="count-btn active" data-count="1">1名</button>
                <button class="count-btn" data-count="3">3名</button>
                <button class="count-btn" data-count="5">5名</button>
            </div>
        </div>

        <div class="lottery-section">
            <div class="lottery-display" id="lotteryDisplay">点击开始抽奖</div>
            <div class="winner-badge" id="winnerBadge">🎉 恭喜中奖！</div>
        </div>

        <div class="control-section">
            <button class="control-btn start-btn" id="startBtn">开始抽奖</button>
            <button class="control-btn reset-btn" id="resetBtn">重置</button>
        </div>

        <div class="history-section">
            <div class="history-title">中奖历史</div>
            <ul id="historyList" class="history-list">
                <li class="empty-history">暂无中奖记录</li>
            </ul>
        </div>
    </div>

    <script>
        const nameList = document.getElementById('nameList');
        const countBtns = document.querySelectorAll('.count-btn');
        const lotteryDisplay = document.getElementById('lotteryDisplay');
        const winnerBadge = document.getElementById('winnerBadge');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const historyList = document.getElementById('historyList');

        let isRunning = false;
        let selectedCount = 1;
        let animation = null;
        let winners = [];
        let history = [];

        // 选择中奖人数
        countBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                countBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCount = +btn.dataset.count;
            });
        });

        // 严格过滤：只允许中文、英文，剔除所有空格、标点、数字、特殊符号
        function filterName(name) {
            return name.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '').trim();
        }

        // 获取清洗后合法名单
        function getNames() {
            const rawArr = nameList.value.trim().split('\n');
            let valid = rawArr.map(item => filterName(item)).filter(item => item);
            // 去重
            return [...new Set(valid)];
        }

        // 开始抽奖
        startBtn.addEventListener('click', () => {
            const names = getNames();
            if (names.length === 0) {
                alert('请输入有效纯人名！\n不能带空格、标点、数字、特殊符号');
                return;
            }
            if (names.length < selectedCount) {
                alert(`有效人数不足，至少需要 ${selectedCount} 人`);
                return;
            }

            if (!isRunning) {
                isRunning = true;
                startBtn.textContent = '停止抽奖';
                lotteryDisplay.classList.add('running');
                winnerBadge.style.display = 'none';

                // 实现：抽几个人，就同时滚动显示几个名字
                let pool = [...names];
                let idxArr = new Array(selectedCount).fill(0);

                animation = setInterval(() => {
                    let showArr = [];
                    for(let i=0;i<selectedCount;i++){
                        idxArr[i]++;
                        showArr.push(pool[idxArr[i] % pool.length]);
                    }
                    lotteryDisplay.textContent = showArr.join('　　');
                }, 100);

            } else {
                // 停止抽奖
                clearInterval(animation);
                isRunning = false;
                startBtn.textContent = '开始抽奖';
                lotteryDisplay.classList.remove('running');

                // 过滤已中奖人员
                const available = names.filter(n => !winners.includes(n));
                const shuffled = [...available].sort(() => Math.random() - 0.5);
                const roundWinners = shuffled.slice(0, selectedCount);

                winners.push(...roundWinners);

                // 最终中奖一行展示
                lotteryDisplay.textContent = roundWinners.join('　　');
                lotteryDisplay.classList.add('winner');
                winnerBadge.style.display = 'block';

                // 历史：本轮所有中奖者合并成一条记录
                history.push({
                    list: roundWinners,
                    num: selectedCount
                });
                updateHistory();
            }
        });

        // 更新中奖历史：每轮一行展示全部
        function updateHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty-history">暂无中奖记录</li>';
                return;
            }
            historyList.innerHTML = history.map((item, index) => `
                <li class="history-item">
                    <span class="history-number">${index+1}</span>
                    <span>${item.list.join('、')}（${item.num}人）</span>
                </li>
            `).join('');
        }

        // 重置
        resetBtn.addEventListener('click', () => {
            clearInterval(animation);
            isRunning = false;
            winners = [];
            history = [];
            startBtn.textContent = '开始抽奖';
            lotteryDisplay.textContent = '点击开始抽奖';
            lotteryDisplay.classList.remove('running', 'winner');
            winnerBadge.style.display = 'none';
            updateHistory();
        });
    </script>
</body>
</html>
